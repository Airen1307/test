<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang thông tin</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.header {
    background: url("images/banner.jpg") center/cover no-repeat;
    height: 180px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
}

.navbar {
    background: #c40000;
    display: flex;
    justify-content: center;
}

.navbar a {
    color: white;
    padding: 14px 20px;
    text-decoration: none;
}

.navbar a:hover {
    background: #a00000;
}

.container {
    display: flex;
    padding: 20px;
}

.content {
    flex: 3;
    padding-right: 20px;
}

.sidebar {
    flex: 1;
}

.sidebar img {
    width: 100%;
    margin-bottom: 15px;
}

.footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>
<body>

<div class="header">
TRƯỜNG CHÍNH TRỊ TỈNH LAI CHÂU
</div>

<div class="navbar">
<a href="#">Trang chủ</a>
<a href="#">Giới thiệu</a>
<a href="#">Tin tức</a>
<a href="#">Video</a>
<a href="#">Liên hệ</a>
</div>

<div class="container">
<div class="content">
<h2>SỰ RA ĐỜI VÀ PHÁT TRIỂN...</h2>
<p><i>Ngày đăng: 26/03/2026</i></p>
<p>Nội dung bài viết của bạn đặt ở đây...</p>
</div>

<div class="sidebar">
<img src="images/banner1.jpg">
<img src="images/banner2.jpg">
</div>
</div>

<div class="footer">
© 2026 - Bản quyền thuộc về bạn
</div>

</body>
</html>
